<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIS — HR Portal</title>
<style>
  :root {
    --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3350;
    --accent:#4f6ef7;--accent2:#38bdf8;--green:#22c55e;--yellow:#f59e0b;
    --red:#ef4444;--text:#e2e8f0;--muted:#7c85a2;--radius:10px;
    --font:'Segoe UI',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;}
  .shell{max-width:520px;margin:0 auto;padding:16px;}
  .header{text-align:center;padding:20px 0 16px;}
  .header h1{font-size:1.3rem;font-weight:700;color:var(--accent2);}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px;}
  .card-title{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:12px;}
  label{display:block;font-size:.78rem;color:var(--muted);margin-bottom:4px;margin-top:12px;}
  label:first-of-type{margin-top:0;}
  input,select{width:100%;padding:10px 12px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:.88rem;font-family:var(--font);outline:none;transition:border .2s;}
  input:focus,select:focus{border-color:var(--accent);}
  .tab-bar{display:flex;gap:6px;margin-bottom:16px;background:var(--surface2);border-radius:8px;padding:4px;}
  .tab{flex:1;padding:8px;text-align:center;border-radius:6px;cursor:pointer;font-size:.78rem;color:var(--muted);transition:all .2s;}
  .tab.active{background:var(--accent);color:#fff;font-weight:600;}
  .btn{width:100%;padding:12px;border-radius:var(--radius);border:none;font-size:.9rem;font-weight:600;cursor:pointer;margin-top:10px;}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-primary:hover{background:#6b82f8;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .info-box{background:var(--surface2);border-left:3px solid var(--accent);border-radius:6px;padding:10px 14px;margin-top:10px;font-size:.8rem;line-height:1.6;}
  .worker-row{background:var(--surface2);border-radius:7px;padding:10px 12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;font-size:.82rem;}
  .hidden{display:none!important;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);color:var(--text);padding:12px 22px;border-radius:30px;font-size:.85rem;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
  .toast.show{opacity:1;}
  .att-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;gap:6px;align-items:center;font-size:.78rem;margin-bottom:8px;}
  .att-row input{padding:7px 8px;}
  .att-header{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;gap:6px;font-size:.7rem;color:var(--muted);margin-bottom:4px;text-align:center;}
  .att-header div:first-child{text-align:left;}
</style>
</head>
<body>
<div class="shell">
  <div class="header">
    <h1>👥 MIS — HR Portal</h1>
    <p>Champo Carpets, Panipat</p>
  </div>

  <!-- PIN -->
  <div id="step-pin" class="card">
    <div class="card-title">HR Access</div>
    <label>HR PIN</label>
    <input type="password" id="hr-pin" maxlength="6" placeholder="••••">
    <button class="btn btn-primary" onclick="hrLogin()">Login</button>
  </div>

  <!-- MAIN -->
  <div id="hr-main" class="hidden">
    <div class="tab-bar">
      <div class="tab active" onclick="switchTab('new-worker')">New Joinee</div>
      <div class="tab" onclick="switchTab('exit-worker')">Exit</div>
      <div class="tab" onclick="switchTab('rate-change')">Rate Change</div>
      <div class="tab" onclick="switchTab('attendance')">Attendance</div>
    </div>

    <!-- NEW WORKER -->
    <div id="tab-new-worker" class="card">
      <div class="card-title">New Joinee Registration</div>
      <label>Full Name</label>
      <input type="text" id="nw-name" placeholder="Worker name">
      <label>Department</label>
      <select id="nw-dept">
        <option value="">— Select —</option>
        <option value="WEAVING">Weaving</option>
        <option value="KNITTING">Knitting</option>
        <option value="EMBROIDERY">Embroidery</option>
        <option value="TUFTING_CUT">Tufting (Cut)</option>
        <option value="TUFTING_LOOP">Tufting (Loop)</option>
        <option value="TUFTING_ROBO">Tufting (Robo)</option>
      </select>
      <label>Pay Type</label>
      <select id="nw-pay-type" onchange="onPayTypeChange()">
        <option value="Salary">Salary (Monthly)</option>
        <option value="Piece_Rate">Piece Rate</option>
      </select>
      <div class="row2">
        <div>
          <label id="nw-rate-label">Monthly Salary (₹)</label>
          <input type="number" id="nw-rate" placeholder="0">
        </div>
        <div>
          <label>Shift</label>
          <select id="nw-shift">
            <option value="Day">Day</option>
            <option value="Night">Night</option>
            <option value="Both">Both</option>
          </select>
        </div>
      </div>
      <label>Machine ID <span style="color:var(--muted);font-size:.73rem">(salary workers only)</span></label>
      <input type="text" id="nw-machine" placeholder="e.g. LOOM-03">
      <label>Join Date</label>
      <input type="date" id="nw-join-date">
      <label>Status</label>
      <select id="nw-status">
        <option value="Trainee_M1">Trainee Month 1</option>
        <option value="Trainee_M2">Trainee Month 2</option>
        <option value="Active">Active (Trained)</option>
      </select>
      <label>Notes</label>
      <input type="text" id="nw-notes" placeholder="Optional">
      <button class="btn btn-primary" onclick="submitNewWorker()">Register Worker</button>
    </div>

    <!-- EXIT WORKER -->
    <div id="tab-exit-worker" class="card hidden">
      <div class="card-title">Worker Exit</div>
      <label>Search Worker</label>
      <input type="text" id="exit-search" placeholder="Type name…" oninput="searchWorkers('exit')">
      <div id="exit-results" style="margin-top:8px"></div>
      <div id="exit-form" class="hidden">
        <div class="info-box" id="exit-worker-info"></div>
        <label>Last Working Date</label>
        <input type="date" id="exit-date">
        <label>Exit Reason</label>
        <select id="exit-reason">
          <option value="Resigned">Resigned</option>
          <option value="Terminated">Terminated</option>
          <option value="Contract_End">Contract End</option>
        </select>
        <button class="btn btn-primary" onclick="submitExit()">Confirm Exit</button>
      </div>
    </div>

    <!-- RATE CHANGE -->
    <div id="tab-rate-change" class="card hidden">
      <div class="card-title">Salary / Rate Change</div>
      <label>Search Worker</label>
      <input type="text" id="rate-search" placeholder="Type name…" oninput="searchWorkers('rate')">
      <div id="rate-results" style="margin-top:8px"></div>
      <div id="rate-form" class="hidden">
        <div class="info-box" id="rate-worker-info"></div>
        <label>New Rate (₹)</label>
        <input type="number" id="rate-new-rate" placeholder="0">
        <label>Effective From</label>
        <input type="date" id="rate-effective-date">
        <button class="btn btn-primary" onclick="submitRateChange()">Update Rate</button>
      </div>
    </div>

    <!-- ATTENDANCE -->
    <div id="tab-attendance" class="card hidden">
      <div class="card-title">Monthly Attendance Submission</div>
      <div class="row2">
        <div>
          <label>Month</label>
          <input type="month" id="att-month">
        </div>
        <div>
          <label>Department</label>
          <select id="att-dept" onchange="loadAttendanceWorkers()">
            <option value="">All</option>
            <option value="WEAVING">Weaving</option>
            <option value="KNITTING">Knitting</option>
            <option value="EMBROIDERY">Embroidery</option>
            <option value="TUFTING_CUT">Tufting Cut</option>
            <option value="TUFTING_LOOP">Tufting Loop</option>
            <option value="TUFTING_ROBO">Tufting Robo</option>
          </select>
        </div>
      </div>
      <button class="btn btn-primary" style="margin-top:10px" onclick="loadAttendanceWorkers()">Load Workers</button>
      <div id="att-table" class="hidden" style="margin-top:14px">
        <div class="att-header">
          <div>Worker</div>
          <div>Present</div>
          <div>Absent</div>
          <div>Sundays</div>
          <div>Pay (₹)</div>
        </div>
        <div id="att-rows"></div>
        <button class="btn btn-primary" onclick="submitAttendance()">Submit Attendance</button>
      </div>
    </div>
  </div>

  <div id="step-result" class="card hidden">
    <div class="card-title">✓ Done</div>
    <div id="result-msg" class="info-box"></div>
    <button class="btn btn-primary" onclick="resetResult()">Back</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = "YOUR_MIS_APPS_SCRIPT_URL_HERE";
const PASSWORD   = "mis2025champo";
const HR_PIN     = "HR2025"; // set your HR PIN here or validate via backend

let hrState = { pin:"", workers:[], selectedWorker: null };

function toast(msg,dur=2500){
  const el=document.getElementById("toast");
  el.textContent=msg;el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"),dur);
}

async function hrLogin(){
  const pin = document.getElementById("hr-pin").value.trim();
  // Simple PIN check — extend via backend verifyPin if needed
  if(pin !== HR_PIN) return toast("❌ Invalid HR PIN");
  hrState.pin = pin;
  document.getElementById("step-pin").classList.add("hidden");
  document.getElementById("hr-main").classList.remove("hidden");
  // Load all workers
  const res = await api("getWorkers",{facility:"PNP"});
  hrState.workers = res.workers || [];
}

function switchTab(name){
  document.querySelectorAll(".tab").forEach((t,i)=>{
    t.classList.toggle("active", ["new-worker","exit-worker","rate-change","attendance"][i]===name);
  });
  ["new-worker","exit-worker","rate-change","attendance"].forEach(t=>{
    const el = document.getElementById("tab-"+t);
    if(el) el.classList.toggle("hidden", t!==name);
  });
}

function onPayTypeChange(){
  const pt = document.getElementById("nw-pay-type").value;
  document.getElementById("nw-rate-label").textContent =
    pt==="Salary" ? "Monthly Salary (₹)" : "Rate Per Piece (₹)";
}

async function submitNewWorker(){
  const name  = document.getElementById("nw-name").value.trim();
  const dept  = document.getElementById("nw-dept").value;
  const pay   = document.getElementById("nw-pay-type").value;
  const rate  = document.getElementById("nw-rate").value;
  const shift = document.getElementById("nw-shift").value;
  const join  = document.getElementById("nw-join-date").value;
  if(!name||!dept||!rate||!join) return toast("Fill all required fields");
  const res = await api("hrNewWorker",{
    name,dept,payType:pay,rate:parseFloat(rate),
    shift,machineId:document.getElementById("nw-machine").value.trim(),
    joinDate:join,
    status:document.getElementById("nw-status").value,
    notes:document.getElementById("nw-notes").value,
    facility:"PNP", submittedBy:"HR"
  });
  if(res.status==="ok"){
    showResult(`Worker registered. ID: <b>${res.workerId}</b>`);
    // Refresh worker list
    const wres = await api("getWorkers",{facility:"PNP"});
    hrState.workers = wres.workers||[];
  } else toast("❌ "+res.message);
}

function searchWorkers(mode){
  const q = document.getElementById(mode+"-search").value.toLowerCase();
  const results = hrState.workers.filter(w=>w.name.toLowerCase().includes(q)).slice(0,6);
  const container = document.getElementById(mode+"-results");
  container.innerHTML = results.map(w=>`
    <div class="worker-row" style="cursor:pointer" onclick="selectWorker('${mode}','${w.id}')">
      <div>
        <div style="font-weight:600">${w.name}</div>
        <div style="color:var(--muted);font-size:.73rem">${w.dept} · ${w.payType} · ${w.status}</div>
      </div>
      <div style="color:var(--accent2);font-size:.8rem">Select →</div>
    </div>
  `).join("");
}

function selectWorker(mode, wid){
  const w = hrState.workers.find(x=>x.id===wid);
  if(!w) return;
  hrState.selectedWorker = w;
  if(mode==="exit"){
    document.getElementById("exit-worker-info").innerHTML =
      `<b>${w.name}</b> · ${w.dept} · ${w.payType}`;
    document.getElementById("exit-date").value = new Date().toISOString().split("T")[0];
    document.getElementById("exit-form").classList.remove("hidden");
    document.getElementById("exit-results").innerHTML="";
  } else if(mode==="rate"){
    document.getElementById("rate-worker-info").innerHTML =
      `<b>${w.name}</b> · ${w.dept} · ${w.payType}`;
    document.getElementById("rate-effective-date").value = new Date().toISOString().split("T")[0];
    document.getElementById("rate-form").classList.remove("hidden");
    document.getElementById("rate-results").innerHTML="";
  }
}

async function submitExit(){
  if(!hrState.selectedWorker) return toast("Select a worker first");
  const date   = document.getElementById("exit-date").value;
  const reason = document.getElementById("exit-reason").value;
  if(!date) return toast("Select exit date");
  const res = await api("hrExitWorker",{
    workerId: hrState.selectedWorker.id,
    exitDate: date, exitReason: reason
  });
  if(res.status==="ok") showResult(`Worker <b>${hrState.selectedWorker.name}</b> marked inactive.`);
  else toast("❌ "+res.message);
}

async function submitRateChange(){
  if(!hrState.selectedWorker) return toast("Select a worker first");
  const newRate = parseFloat(document.getElementById("rate-new-rate").value);
  const effDate = document.getElementById("rate-effective-date").value;
  if(!newRate||!effDate) return toast("Fill all fields");
  const res = await api("hrRateChange",{
    workerId: hrState.selectedWorker.id,
    name: hrState.selectedWorker.name,
    newRate, effectiveFrom: effDate,
    payType: hrState.selectedWorker.payType,
    submittedBy:"HR"
  });
  if(res.status==="ok") showResult("Rate updated successfully.");
  else toast("❌ "+res.message);
}

async function loadAttendanceWorkers(){
  const dept  = document.getElementById("att-dept").value;
  const month = document.getElementById("att-month").value;
  if(!month) return toast("Select a month");
  const res = await api("getWorkers",{ dept: dept||undefined, facility:"PNP"});
  const workers = (res.workers||[]).filter(w=>w.status!=="Inactive");
  const rowsDiv = document.getElementById("att-rows");
  rowsDiv.innerHTML = workers.map(w=>`
    <div class="att-row" data-wid="${w.id}" data-wname="${w.name}" data-wdept="${w.dept}">
      <div style="font-weight:600;font-size:.78rem;overflow:hidden;text-overflow:ellipsis">${w.name}</div>
      <input type="number" class="att-present" min="0" max="31" placeholder="0">
      <input type="number" class="att-absent"  min="0" max="31" placeholder="0">
      <input type="number" class="att-sundays" min="0" max="5"  placeholder="0">
      <input type="number" class="att-pay"     min="0" placeholder="₹">
    </div>
  `).join("");
  document.getElementById("att-table").classList.remove("hidden");
}

async function submitAttendance(){
  const month = document.getElementById("att-month").value;
  const rows  = document.querySelectorAll("#att-rows .att-row");
  const workers = [];
  rows.forEach(row=>{
    workers.push({
      workerId:     row.dataset.wid,
      name:         row.dataset.wname,
      dept:         row.dataset.wdept,
      daysPresent:  parseInt(row.querySelector(".att-present").value)||0,
      daysAbsent:   parseInt(row.querySelector(".att-absent").value) ||0,
      sundaysWorked:parseInt(row.querySelector(".att-sundays").value)||0,
      totalPayable: parseInt(row.querySelector(".att-present").value)||0,
      actualPay:    parseFloat(row.querySelector(".att-pay").value)||""
    });
  });
  if(!workers.length) return toast("No workers loaded");
  const res = await api("submitAttendance",{
    month, period:"Monthly",
    workers, submittedBy:"HR"
  });
  if(res.status==="ok") showResult(`Attendance submitted for <b>${res.submitted}</b> workers.`);
  else toast("❌ "+res.message);
}

function showResult(msg){
  document.getElementById("result-msg").innerHTML = msg;
  document.getElementById("hr-main").classList.add("hidden");
  document.getElementById("step-result").classList.remove("hidden");
}

function resetResult(){
  document.getElementById("step-result").classList.add("hidden");
  document.getElementById("hr-main").classList.remove("hidden");
}

async function api(action,data){
  try{
    const res = await fetch(SCRIPT_URL,{
      method:"POST", redirect:"follow",
      headers:{"Content-Type":"text/plain"},
      body:JSON.stringify({action,password:PASSWORD,data})
    });
    return await res.json();
  }catch(e){ return{status:"error",message:e.toString()}; }
}

document.addEventListener("DOMContentLoaded",()=>{
  document.getElementById("att-month").value =
    new Date().toISOString().slice(0,7);
});
</script>
</body>
</html>
