<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIS — Daily Output</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #4f6ef7;
    --accent2: #38bdf8;
    --green: #22c55e;
    --yellow: #f59e0b;
    --red: #ef4444;
    --text: #e2e8f0;
    --muted: #7c85a2;
    --radius: 10px;
    --font: 'Segoe UI', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }
  .shell { max-width: 520px; margin: 0 auto; padding: 16px; }
  .header { text-align: center; padding: 20px 0 16px; }
  .header h1 { font-size: 1.3rem; font-weight: 700; color: var(--accent2); }
  .header p  { font-size: .78rem; color: var(--muted); margin-top: 4px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 14px; }
  .card-title { font-size: .7rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 12px; }
  label { display: block; font-size: .78rem; color: var(--muted); margin-bottom: 4px; margin-top: 12px; }
  label:first-of-type { margin-top: 0; }
  input, select, textarea {
    width: 100%; padding: 10px 12px; border-radius: 7px;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text); font-size: .88rem; font-family: var(--font);
    outline: none; transition: border .2s;
  }
  input:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--surface2); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .pill-group { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
  .pill {
    padding: 7px 14px; border-radius: 20px; font-size: .8rem; cursor: pointer;
    border: 1.5px solid var(--border); background: var(--surface2); color: var(--muted);
    transition: all .15s; user-select: none;
  }
  .pill.active { border-color: var(--accent); background: rgba(79,110,247,.18); color: var(--accent2); }
  .btn {
    width: 100%; padding: 13px; border-radius: var(--radius); border: none;
    font-size: .95rem; font-weight: 600; cursor: pointer; transition: all .2s;
    margin-top: 6px;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #6b82f8; }
  .btn-primary:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
  .btn-outline { background: transparent; color: var(--accent2); border: 1.5px solid var(--accent); }
  .tag { display: inline-block; padding: 3px 9px; border-radius: 12px; font-size: .72rem; font-weight: 600; }
  .tag-green  { background: rgba(34,197,94,.15); color: var(--green); }
  .tag-yellow { background: rgba(245,158,11,.15); color: var(--yellow); }
  .tag-red    { background: rgba(239,68,68,.15);  color: var(--red); }
  .tag-blue   { background: rgba(79,110,247,.15); color: var(--accent2); }
  .info-box { background: var(--surface2); border-left: 3px solid var(--accent); border-radius: 6px; padding: 10px 14px; margin-top: 10px; font-size: .8rem; line-height: 1.6; }
  .info-box b { color: var(--accent2); }
  .entries-list { margin-top: 10px; }
  .entry-item {
    background: var(--surface2); border-radius: 7px; padding: 10px 12px;
    margin-bottom: 8px; font-size: .8rem; display: flex; justify-content: space-between; align-items: center;
  }
  .entry-item .e-main { color: var(--text); font-weight: 600; }
  .entry-item .e-sub  { color: var(--muted); font-size: .73rem; margin-top: 2px; }
  .hidden { display: none !important; }
  .section-divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
  .step-indicator { display: flex; gap: 6px; justify-content: center; margin-bottom: 16px; }
  .step-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); transition: background .2s; }
  .step-dot.active { background: var(--accent); }
  .step-dot.done   { background: var(--green); }
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 12px 22px; border-radius: 30px;
    font-size: .85rem; z-index: 999; opacity: 0; transition: opacity .3s;
    pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .multi-entry-header { display: flex; justify-content: space-between; align-items: center; }
</style>
</head>
<body>
<div class="shell">
  <div class="header">
    <h1>⚙️ MIS — Daily Output</h1>
    <p>Champo Carpets, Panipat</p>
  </div>

  <!-- STEP 1: PIN -->
  <div id="step-pin" class="card">
    <div class="card-title">Department Head PIN</div>
    <label>Enter your PIN</label>
    <input type="password" inputmode="numeric" id="pin-input" maxlength="6" placeholder="••••">
    <button class="btn btn-primary" style="margin-top:12px" onclick="verifyPin()">Verify PIN</button>
  </div>

  <!-- STEP 2: SHIFT SETUP -->
  <div id="step-shift" class="card hidden">
    <div class="card-title">Shift Setup</div>
    <div id="head-greeting" class="info-box" style="margin-bottom:12px"></div>

    <label>Date</label>
    <input type="date" id="sel-date">

    <label>Shift</label>
    <div class="pill-group" id="shift-pills">
      <div class="pill" onclick="selectPill(this,'shift')" data-val="Day">Day</div>
      <div class="pill" onclick="selectPill(this,'shift')" data-val="Night">Night</div>
    </div>

    <label style="margin-top:14px">Department</label>
    <select id="sel-dept" onchange="onDeptChange()">
      <option value="">— Select —</option>
    </select>

    <button class="btn btn-primary" style="margin-top:14px" onclick="loadMachines()">Load Machines →</button>
  </div>

  <!-- STEP 3: OUTPUT ENTRY -->
  <div id="step-entry" class="card hidden">
    <div class="multi-entry-header">
      <div class="card-title" style="margin-bottom:0">Output Entry</div>
      <span id="entry-count-tag" class="tag tag-blue">0 entries</span>
    </div>

    <div class="entries-list" id="entries-list"></div>
    <hr class="section-divider">

    <!-- Machine + Worker -->
    <label>Machine</label>
    <select id="sel-machine" onchange="onMachineChange()">
      <option value="">— Select machine —</option>
    </select>

    <label>Worker</label>
    <select id="sel-worker">
      <option value="">— Select worker —</option>
    </select>

    <!-- Order source -->
    <label>Order Source</label>
    <div class="pill-group" id="order-source-pills">
      <div class="pill active" onclick="selectPill(this,'orderSource')" data-val="PCS">PCS Order</div>
      <div class="pill" onclick="selectPill(this,'orderSource')" data-val="MISC">Misc Order</div>
    </div>

    <div id="pcs-fields">
      <label>PO</label>
      <input type="text" id="inp-po" placeholder="e.g. H&M-2425-001">
      <label>SKU</label>
      <input type="text" id="inp-sku" placeholder="e.g. SKU-001">
    </div>
    <div id="misc-fields" class="hidden">
      <label>Misc Order Ref</label>
      <select id="sel-misc"></select>
    </div>

    <label>SKU Category</label>
    <select id="sel-sku-cat">
      <option value="">— Select —</option>
      <option>Rug</option>
      <option>Rug Base - Print</option>
      <option>Runner</option>
      <option>Cushion - Both Panels</option>
      <option>Cushion - Front Only</option>
      <option>Carpet</option>
      <option>Bath Mat</option>
    </select>

    <label>Run Type</label>
    <div class="pill-group" id="run-type-pills">
      <div class="pill active" onclick="selectPill(this,'runType')" data-val="Original">Original</div>
      <div class="pill" onclick="selectPill(this,'runType')" data-val="Shortfall_Rerun">Shortfall Rerun</div>
      <div class="pill" onclick="selectPill(this,'runType')" data-val="Sampling">Sampling</div>
    </div>

    <!-- Output -->
    <hr class="section-divider">
    <label>Output</label>
    <div class="row2">
      <div>
        <label>Quantity</label>
        <input type="number" id="inp-output" placeholder="0" min="0" step="0.01" oninput="updatePreview()">
      </div>
      <div>
        <label>Unit</label>
        <input type="text" id="inp-unit" readonly style="background:var(--border);cursor:default">
      </div>
    </div>
    <div id="derived-preview" class="info-box hidden" style="margin-top:8px"></div>

    <!-- Dept-specific fields -->
    <div id="weaving-fields" class="hidden">
      <hr class="section-divider">
      <div class="card-title">Weaving Details</div>
      <div class="row3">
        <div><label>No. of Colors</label><input type="number" id="w-colors" min="1" max="20" oninput="updatePreview()"></div>
        <div><label>Reed Count</label><input type="number" id="w-reed" min="1" oninput="updatePreview()"></div>
        <div><label>Picks/inch</label><input type="number" id="w-picks" min="1" oninput="updatePreview()"></div>
      </div>
    </div>

    <div id="knitting-fields" class="hidden">
      <hr class="section-divider">
      <div class="card-title">Knitting Details</div>
      <label>No. of Colors</label>
      <input type="number" id="k-colors" min="1" max="20" oninput="updatePreview()">
    </div>

    <div id="tufting-fields" class="hidden">
      <hr class="section-divider">
      <div class="card-title">Tufting Details</div>
      <label>No. of Colors in Design</label>
      <input type="number" id="t-colors" min="1" max="20" oninput="updatePreview()">
      <label>Piece Dimensions (cm)</label>
      <div class="row2">
        <div><label>Length</label><input type="number" id="t-len" min="1" oninput="updatePreview()"></div>
        <div><label>Width</label><input type="number" id="t-wid" min="1" oninput="updatePreview()"></div>
      </div>
    </div>

    <div id="embroidery-fields" class="hidden">
      <hr class="section-divider">
      <div class="card-title">Embroidery Details</div>
      <div class="row3">
        <div><label>SPM</label><input type="number" id="e-spm" min="100" oninput="updatePreview()"></div>
        <div><label>Total Stitches</label><input type="number" id="e-stitches" min="1" oninput="updatePreview()"></div>
        <div><label>Heads Used</label><input type="number" id="e-heads" min="1" oninput="updatePreview()"></div>
      </div>
    </div>

    <!-- Downtime -->
    <hr class="section-divider">
    <label>Downtime (minutes) <span style="color:var(--muted);font-size:.75rem">— leave 0 if none</span></label>
    <input type="number" id="inp-downtime" value="0" min="0" oninput="onDowntimeChange()">
    <div id="downtime-reason-wrap" class="hidden" style="margin-top:8px">
      <label>Downtime Reason</label>
      <select id="sel-downtime-reason">
        <option value="">— Select reason —</option>
        <option>Worker_Absent</option>
        <option>Machine_Breakdown</option>
        <option>No_Material</option>
        <option>Waiting_Woven_Base</option>
        <option>Power_Cut</option>
        <option>No_Order</option>
        <option>Other</option>
      </select>
    </div>

    <button class="btn btn-outline" style="margin-top:14px" onclick="addEntry()">+ Add Entry</button>
  </div>

  <!-- STEP 4: REVIEW + SUBMIT -->
  <div id="step-review" class="card hidden">
    <div class="card-title">Review & Submit</div>
    <div id="review-list"></div>
    <button class="btn btn-primary" onclick="submitAll()">Submit All Entries</button>
    <button class="btn btn-outline" style="margin-top:8px" onclick="goBackToEntry()">← Add More</button>
  </div>

  <!-- RESULT -->
  <div id="step-result" class="card hidden">
    <div class="card-title">Submitted ✓</div>
    <div id="result-content"></div>
    <button class="btn btn-primary" style="margin-top:14px" onclick="resetForm()">New Submission</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = "YOUR_MIS_APPS_SCRIPT_URL_HERE";
const PASSWORD   = "mis2025champo";

let state = {
  pin: "", headName: "", headDepts: [], facility: "PNP",
  date: "", shift: "", dept: "",
  machines: [], workers: [], miscOrders: [],
  entries: [],
  currentMachine: null,
  pills: { shift: "", orderSource: "PCS", runType: "Original" }
};

// ── Toast ──────────────────────────────────────────────────
function toast(msg, dur=2500) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), dur);
}

// ── Pill selector ──────────────────────────────────────────
function selectPill(el, group) {
  el.closest(".pill-group").querySelectorAll(".pill").forEach(p => p.classList.remove("active"));
  el.classList.add("active");
  state.pills[group] = el.dataset.val;
  if (group === "orderSource") toggleOrderSource();
  updatePreview();
}

function getPill(group) {
  return state.pills[group] || "";
}

// ── Step visibility ────────────────────────────────────────
function show(id)   { document.getElementById(id).classList.remove("hidden"); }
function hide(id)   { document.getElementById(id).classList.add("hidden"); }
function toggle(id, bool) { bool ? show(id) : hide(id); }

// ── Verify PIN ─────────────────────────────────────────────
async function verifyPin() {
  const pin = document.getElementById("pin-input").value.trim();
  if (!pin) return toast("Enter your PIN");
  const res = await api("verifyPin", { pin });
  if (res.status !== "ok") return toast("❌ " + res.message);
  state.pin      = pin;
  state.headName = res.name;
  state.headDepts= res.depts;
  state.facility = res.facility || "PNP";
  hide("step-pin");
  // Set today's date
  document.getElementById("sel-date").value = new Date().toISOString().split("T")[0];
  // Populate dept dropdown from head's depts
  const dsel = document.getElementById("sel-dept");
  dsel.innerHTML = '<option value="">— Select —</option>';
  res.depts.forEach(d => {
    const o = document.createElement("option");
    o.value = d; o.textContent = deptLabel(d);
    dsel.appendChild(o);
  });
  if (res.depts.length === 1) { dsel.value = res.depts[0]; }
  document.getElementById("head-greeting").innerHTML =
    `Welcome, <b>${res.name}</b>. Facility: <b>${state.facility}</b>`;
  show("step-shift");
}

function deptLabel(d) {
  return { WEAVING:"Weaving", KNITTING:"Knitting", EMBROIDERY:"Embroidery",
           TUFTING_CUT:"Tufting (Cut)", TUFTING_LOOP:"Tufting (Loop)",
           TUFTING_ROBO:"Tufting (Robo)" }[d] || d;
}

// ── Load machines ──────────────────────────────────────────
async function loadMachines() {
  state.date  = document.getElementById("sel-date").value;
  state.shift = getPill("shift");
  state.dept  = document.getElementById("sel-dept").value;
  if (!state.date)  return toast("Select a date");
  if (!state.shift) return toast("Select a shift");
  if (!state.dept)  return toast("Select a department");

  const [mRes, wRes, mORes] = await Promise.all([
    api("getMachines",   { depts: [state.dept], facility: state.facility }),
    api("getWorkers",    { dept: state.dept, facility: state.facility }),
    api("getMiscOrders", {})
  ]);

  state.machines   = mRes.machines   || [];
  state.workers    = wRes.workers    || [];
  state.miscOrders = mORes.miscOrders|| [];

  // Populate machine dropdown
  const msel = document.getElementById("sel-machine");
  msel.innerHTML = '<option value="">— Select machine —</option>';
  state.machines.forEach(m => {
    const o = document.createElement("option");
    o.value = m.id;
    o.textContent = `${m.name} (${m.type}${m.spec1 ? ' · '+m.spec1+'"' : ''})`;
    msel.appendChild(o);
  });

  // Populate worker dropdown
  const wsel = document.getElementById("sel-worker");
  wsel.innerHTML = '<option value="">— Select worker —</option>';
  state.workers.forEach(w => {
    const o = document.createElement("option");
    o.value = w.id; o.textContent = w.name;
    wsel.appendChild(o);
  });

  // Populate misc orders
  const misel = document.getElementById("sel-misc");
  misel.innerHTML = '<option value="">— Select —</option>';
  state.miscOrders.forEach(mo => {
    const o = document.createElement("option");
    o.value = mo.ref; o.textContent = `${mo.ref} · ${mo.buyer} · ${mo.sku}`;
    misel.appendChild(o);
  });

  // Set output unit
  const unit = deptUnit(state.dept);
  document.getElementById("inp-unit").value = unit;

  // Show dept-specific fields
  hide("weaving-fields"); hide("knitting-fields");
  hide("tufting-fields"); hide("embroidery-fields");
  if (state.dept === "WEAVING")                   show("weaving-fields");
  else if (state.dept === "KNITTING")             show("knitting-fields");
  else if (state.dept.startsWith("TUFTING"))      show("tufting-fields");
  else if (state.dept === "EMBROIDERY")           show("embroidery-fields");

  hide("step-shift");
  show("step-entry");
}

function deptUnit(dept) {
  if (dept === "WEAVING" || dept === "KNITTING") return "meters";
  return "pcs";
}

function onDeptChange() {
  // auto-select if only option
}

function onMachineChange() {
  const mid = document.getElementById("sel-machine").value;
  state.currentMachine = state.machines.find(m => m.id === mid) || null;
  updatePreview();
}

function toggleOrderSource() {
  const src = getPill("orderSource");
  toggle("pcs-fields",  src === "PCS");
  toggle("misc-fields", src === "MISC");
}

function onDowntimeChange() {
  const dt = parseFloat(document.getElementById("inp-downtime").value) || 0;
  toggle("downtime-reason-wrap", dt > 0);
}

// ── Live preview (sqm/sqft, difficulty) ───────────────────
function updatePreview() {
  const output = parseFloat(document.getElementById("inp-output").value) || 0;
  const dept   = state.dept;
  const m      = state.currentMachine;
  if (!output || !dept) { hide("derived-preview"); return; }

  let sqm = 0, sqft = 0, diffHint = "";

  if ((dept === "WEAVING" || dept === "KNITTING") && m && m.spec1) {
    const widthM = parseFloat(m.spec1) * 0.0254;
    sqm  = output * widthM;
    sqft = sqm * 10.7639;
  } else if (dept.startsWith("TUFTING")) {
    const l = parseFloat(document.getElementById("t-len").value) || 0;
    const w = parseFloat(document.getElementById("t-wid").value) || 0;
    if (l && w) { sqm = output * (l/100) * (w/100); sqft = sqm * 10.7639; }
  }

  const colors = parseInt(
    document.getElementById(dept==="WEAVING"?"w-colors":dept==="KNITTING"?"k-colors":"t-colors")?.value
  ) || 0;
  if (colors) {
    const cMult = colors === 1 ? 1.0 : colors <= 3 ? 1.2 : colors <= 6 ? 1.5 : 1.8;
    diffHint = ` · Diff ×${cMult}`;
  }

  const preview = document.getElementById("derived-preview");
  preview.innerHTML = `
    <b>Preview:</b> ${sqm.toFixed(2)} sqm &nbsp;|&nbsp; ${sqft.toFixed(2)} sqft${diffHint}
  `;
  show("derived-preview");
}

// ── Add entry to batch ─────────────────────────────────────
function addEntry() {
  const output  = parseFloat(document.getElementById("inp-output").value);
  const machine = document.getElementById("sel-machine").value;
  const worker  = document.getElementById("sel-worker");
  const workerName = worker.options[worker.selectedIndex]?.text || "";
  const workerId   = worker.value || "";

  if (!machine)    return toast("Select a machine");
  if (!workerName) return toast("Select a worker");
  if (!output || output <= 0) return toast("Enter output quantity");

  const src = getPill("orderSource");
  let po = "", sku = "", miscRef = "";
  if (src === "PCS") {
    po  = document.getElementById("inp-po").value.trim();
    sku = document.getElementById("inp-sku").value.trim();
    if (!po || !sku) return toast("Enter PO and SKU");
  } else {
    miscRef = document.getElementById("sel-misc").value;
    if (!miscRef) return toast("Select misc order");
  }

  const skuCat  = document.getElementById("sel-sku-cat").value;
  const runType = getPill("runType");
  const unit    = deptUnit(state.dept);
  const downtime = parseFloat(document.getElementById("inp-downtime").value) || 0;
  const downReason = document.getElementById("sel-downtime-reason").value;

  const entry = {
    machineId:   machine,
    machineName: state.machines.find(m=>m.id===machine)?.name || machine,
    workerId, workerName,
    orderSource: src, po, sku, miscRef, skuCategory: skuCat, runType,
    rawOutput: output, outputUnit: unit,
    noOfColors:   parseInt(document.getElementById(state.dept==="WEAVING"?"w-colors":state.dept==="KNITTING"?"k-colors":"t-colors")?.value)||"",
    reedCount:    parseInt(document.getElementById("w-reed")?.value) || "",
    picksPerInch: parseInt(document.getElementById("w-picks")?.value)|| "",
    designSpm:    parseInt(document.getElementById("e-spm")?.value)  || "",
    totalStitches:parseInt(document.getElementById("e-stitches")?.value)||"",
    headsUsed:    parseInt(document.getElementById("e-heads")?.value)|| "",
    pieceLengthCm:parseInt(document.getElementById("t-len")?.value)  || "",
    pieceWidthCm: parseInt(document.getElementById("t-wid")?.value)  || "",
    downtimeMins: downtime, downtimeReason: downReason
  };
  state.entries.push(entry);
  renderEntryList();
  clearEntryFields();
  toast(`✓ Entry added (${state.entries.length} total)`);
}

function clearEntryFields() {
  ["inp-output","inp-po","inp-sku","inp-downtime",
   "w-colors","w-reed","w-picks","k-colors",
   "t-colors","t-len","t-wid",
   "e-spm","e-stitches","e-heads"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = id === "inp-downtime" ? "0" : "";
  });
  hide("downtime-reason-wrap");
  hide("derived-preview");
  document.getElementById("sel-machine").value = "";
  document.getElementById("sel-worker").value  = "";
  state.currentMachine = null;
}

function renderEntryList() {
  const list = document.getElementById("entries-list");
  const tag  = document.getElementById("entry-count-tag");
  tag.textContent = state.entries.length + " entries";
  if (!state.entries.length) { list.innerHTML = ""; return; }
  list.innerHTML = state.entries.map((e, i) => `
    <div class="entry-item">
      <div>
        <div class="e-main">${e.machineName} · ${e.workerName}</div>
        <div class="e-sub">${e.orderSource==="PCS"?e.po+' / '+e.sku:e.miscRef} · ${e.rawOutput} ${e.outputUnit} · ${e.runType}</div>
      </div>
      <span onclick="removeEntry(${i})" style="color:var(--red);cursor:pointer;padding:4px 8px;font-size:.9rem">✕</span>
    </div>
  `).join("");
}

function removeEntry(i) {
  state.entries.splice(i, 1);
  renderEntryList();
}

// ── Review screen ──────────────────────────────────────────
function showReview() {
  if (!state.entries.length) return toast("Add at least one entry");
  const list = document.getElementById("review-list");
  list.innerHTML = state.entries.map((e, i) => `
    <div class="entry-item" style="display:block;margin-bottom:10px">
      <div class="e-main">${i+1}. ${e.machineName} · ${e.workerName}</div>
      <div class="e-sub" style="margin-top:4px">
        ${e.orderSource==="PCS"?`PO: ${e.po} / SKU: ${e.sku}`:`Misc: ${e.miscRef}`}<br>
        Output: ${e.rawOutput} ${e.outputUnit} · ${e.runType} · ${e.skuCategory||'—'}
        ${e.downtimeMins>0?`<br>Downtime: ${e.downtimeMins} min — ${e.downtimeReason}`:''}
      </div>
    </div>
  `).join("");
  hide("step-entry");
  show("step-review");
}

function goBackToEntry() {
  hide("step-review");
  show("step-entry");
}

// ── Submit all ─────────────────────────────────────────────
async function submitAll() {
  if (!state.entries.length) return toast("No entries to submit");
  const btn = document.querySelector("#step-review .btn-primary");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Submitting…';

  const results = [];
  for (const entry of state.entries) {
    const payload = {
      ...entry,
      date:         state.date,
      shift:        state.shift,
      facility:     state.facility,
      submittedBy:  state.headName,
      submittedPin: state.pin
    };
    const res = await api("submitOutput", payload);
    results.push({ entry, res });
  }

  const ok     = results.filter(r => r.res.status === "ok");
  const failed = results.filter(r => r.res.status !== "ok");

  hide("step-review");
  const content = document.getElementById("result-content");
  content.innerHTML = `
    <div class="info-box" style="margin-bottom:10px">
      <b>✓ ${ok.length} submitted</b>${failed.length ? ` · <span style="color:var(--red)">${failed.length} failed</span>` : ''}<br>
      Date: ${state.date} · Shift: ${state.shift} · Dept: ${deptLabel(state.dept)}
    </div>
    ${ok.map(r => `
      <div class="entry-item" style="display:block;margin-bottom:8px">
        <div class="e-main">${r.entry.machineName} · ${r.entry.workerName}</div>
        <div class="e-sub">
          ID: ${r.res.rowId} · ${r.res.sqm} sqm · ${r.res.sqft} sqft
          · Diff: ×${r.res.difficultyScore}
          · Norm: ${r.res.normalizedOutput}
          <br><span class="tag ${r.res.lensFlag==='SYNCED'?'tag-green':'tag-yellow'}">${r.res.lensFlag}</span>
          ${r.res.requiredDaily && r.res.requiredDaily!=='N/A' ? ` · Req/day: <b>${r.res.requiredDaily}</b>` : ''}
        </div>
      </div>
    `).join("")}
    ${failed.map(r => `
      <div class="entry-item" style="display:block;border-left:3px solid var(--red)">
        <div class="e-main" style="color:var(--red)">Failed: ${r.entry.machineName}</div>
        <div class="e-sub">${r.res.message}</div>
      </div>
    `).join("")}
  `;
  show("step-result");
}

function resetForm() {
  state.entries = [];
  state.currentMachine = null;
  hide("step-result");
  hide("step-review");
  // Go back to shift step for another submission
  show("step-shift");
}

// ── API call ───────────────────────────────────────────────
async function api(action, data) {
  try {
    const res = await fetch(SCRIPT_URL, {
      method: "POST", redirect: "follow",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ action, password: PASSWORD, data })
    });
    return await res.json();
  } catch (e) {
    return { status: "error", message: e.toString() };
  }
}

// ── Init ───────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", () => {
  // Set today's date default
  document.getElementById("sel-date").value = new Date().toISOString().split("T")[0];
  // Add review button to entry card
  const entryCard = document.getElementById("step-entry");
  const reviewBtn = document.createElement("button");
  reviewBtn.className = "btn btn-primary";
  reviewBtn.style.marginTop = "8px";
  reviewBtn.textContent = "Review & Submit →";
  reviewBtn.onclick = showReview;
  entryCard.appendChild(reviewBtn);
  // Default order source
  toggleOrderSource();
});
</script>
</body>
</html>
